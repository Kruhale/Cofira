# ========================================
# DOCKER PROFILE CONFIGURATION
# ========================================
spring.application.name=Cofira
# ========================================
# POSTGRESQL DATABASE CONFIGURATION
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cofira}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Puerto del servidor
server.port=${SERVER_PORT:8080}
# JWT Configuration
# El secreto NUNCA se versiona: se inyecta por variable de entorno (ver .env.example).
cofira.jwt.secret=${JWT_SECRET}
cofira.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# Actuator (se elimina 'env' para no exponer configuración/secretos)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Info endpoint - Application metadata
info.app.name=Cofira
info.app.description=Sistema de Gestion de Gimnasios
info.app.version=0.0.1-SNAPSHOT
info.app.encoding=UTF-8
info.app.java.version=21
# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
# Logging for Docker
logging.level.root=INFO
logging.level.com.gestioneventos.cofira=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# ========================================
# DATA.SQL - Ejecutar automáticamente
# ========================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ========================================
# OPENROUTER AI SERVICE CONFIGURATION
# ========================================
openrouter.api-key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}
