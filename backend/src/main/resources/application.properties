spring.application.name=Cofira
# ========================================
# POSTGRESQL DATABASE CONFIGURATION
# ========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cofira}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Puerto del servidor
server.port=8080
# JWT Configuration
# El secreto NUNCA se versiona: se inyecta por variable de entorno (ver .env.example).
cofira.jwt.secret=${JWT_SECRET}
cofira.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# Actuator (se elimina 'env' para no exponer configuración/secretos)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Info endpoint - Application metadata
info.app.name=Cofira
info.app.description=Sistema de Gestion de Gimnasios
info.app.version=0.0.1-SNAPSHOT
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# OpenRouter Configuration
openrouter.api-key=${OPENROUTER_API_KEY}
openrouter.model=openai/gpt-4o-mini

# Contacto - webhook de Discord (se inyecta por entorno; vacio = deshabilitado)
cofira.discord.contacto-webhook=${DISCORD_CONTACTO_WEBHOOK:}
