# ════════════════════════════════════════════════════════════════
# Configuración SOLO para tests (CI). NO contiene credenciales reales.
# El datasource apunta por defecto al postgres service del workflow CI;
# se puede sobreescribir con DB_URL / DB_USERNAME / DB_PASSWORD.
# ════════════════════════════════════════════════════════════════
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cofira_test}
spring.datasource.username=${DB_USERNAME:test}
spring.datasource.password=${DB_PASSWORD:test}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Secretos ficticios solo para que el contexto arranque en los tests
cofira.jwt.secret=clave-de-test-no-secreta-larga-para-hmac-sha256-0123456789abcdef
cofira.jwt.expiration=86400000
openrouter.api-key=test-openrouter-key
