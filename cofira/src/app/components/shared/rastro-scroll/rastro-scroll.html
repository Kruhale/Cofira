<nav class="rastro" aria-label="Recorrido de la página">
  <div class="rastro__ticks" (click)="alPulsar($event)">
    @for (tick of ticks; track tick) {
      <span aria-hidden="true" class="rastro__tick"></span>
    }
  </div>

  <span class="rastro__etiqueta">{{ secciones[indiceActivo()]?.etiqueta }}</span>
</nav>
